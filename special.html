<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WM Tippspiel 2026 — Spezialtipps</title>
  <style>
    :root {
      --bg: #0a0e1a;
      --surface: #131929;
      --surface2: #1c2540;
      --border: #2a3555;
      --text: #e8eaf6;
      --text-muted: #8892b0;
      --green: #4ade80;
      --yellow: #fbbf24;
      --red: #f87171;
      --accent: #4f86f7;
      --radius: 10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", system-ui, sans-serif;
      min-height: 100vh;
    }

    header {
      background: #f5f5f0;
      padding: 1.25rem 1.5rem 1rem;
      text-align: center;
    }

    header img.logo {
      height: 216px;
      width: 216px;
      object-fit: contain;
      display: block;
      margin: 0 auto;
    }

    nav {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
      padding: 0.75rem 1rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    nav a {
      color: var(--text-muted);
      text-decoration: none;
      padding: 0.4rem 1rem;
      border-radius: 6px;
      font-size: 0.9rem;
      transition: all 0.15s;
    }

    nav a:hover, nav a.active { background: var(--accent); color: #fff; }

    main { max-width: 960px; margin: 2rem auto; padding: 0 1rem; }

    #status {
      text-align: right;
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-bottom: 1rem;
    }

    /* ── Scrollable wrapper for wide table ── */
    .sp-outer {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      position: relative;
    }

    .sp-scroll {
      overflow-x: auto;
      overflow-y: visible;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .sp-scroll::-webkit-scrollbar { height: 6px; }
    .sp-scroll::-webkit-scrollbar-track { background: transparent; }
    .sp-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .special-table {
      width: max-content;
      min-width: 100%;
      border-collapse: collapse;
      background: var(--surface);
      font-size: 0.88rem;
      white-space: nowrap;
      table-layout: fixed;
    }

    /* Phase header row */
    .special-table thead tr:first-child { background: #0f1628; }
    .special-table thead tr:last-child  { background: var(--surface2); }

    .special-table th {
      padding: 0.55rem 0.85rem;
      text-align: center;
      font-size: 0.73rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      border-right: 1px solid var(--border);
      vertical-align: bottom;
    }

    .special-table th:last-child { border-right: none; }

    th.sp-phase {
      color: var(--accent);
      font-size: 0.7rem;
      border-bottom: 2px solid var(--border);
      padding-bottom: 0.45rem;
    }

    th.sp-phase + th.sp-phase { border-left: 2px solid var(--border); }

    th.sp-total-hdr {
      border-left: 2px solid var(--border);
      position: sticky;
      right: 0;
      z-index: 3;
      background: #0f1628;
      width: 3.5rem;
    }

    th.sp-player-hdr {
      text-align: left;
      color: var(--text-muted);
      border-right: 2px solid var(--border);
      position: sticky;
      left: 0;
      z-index: 3;
      background: #0f1628;
      width: 7rem;
    }

    .special-table th small {
      display: block;
      font-size: 0.68rem;
      color: var(--text-muted);
      text-transform: none;
      letter-spacing: 0;
      margin-top: 0.15rem;
      opacity: 0.7;
    }

    /* Body */
    .special-table td {
      padding: 0.55rem 0.85rem;
      border-top: 1px solid var(--border);
      border-right: 1px solid var(--border);
      text-align: center;
      vertical-align: middle;
    }

    .special-table td:last-child {
      border-right: none;
      border-left: 2px solid var(--border);
      position: sticky;
      right: 0;
      z-index: 1;
      background: var(--surface);
    }

    .special-table tbody tr:hover td:last-child { background: var(--surface2); }
    .special-table tbody tr:hover { background: var(--surface2); }

    td.sp-player {
      text-align: left;
      font-weight: 600;
      color: var(--text);
      border-right: 2px solid var(--border);
      position: sticky;
      left: 0;
      z-index: 1;
      background: var(--surface);
    }

    .special-table tbody tr:hover td.sp-player { background: var(--surface2); }

    /* Phase sections */
    .sp-phase-section { margin-bottom: 2rem; }
    .sp-phase-heading {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--accent);
      margin-bottom: 0.6rem;
    }

    .sp-cell { font-variant-numeric: tabular-nums; }
    .sp-cell.scored { color: var(--green); font-weight: 600; }
    .sp-cell.miss   { color: var(--text-muted); }
    .sp-cell.empty  { color: var(--border); }
    .sp-cell.total  { color: var(--accent); font-weight: 700; font-size: 1rem; }

    .sp-cell em {
      font-style: normal;
      font-size: 0.75em;
      margin-left: 0.3em;
      opacity: 0.85;
    }

    /* ── Side-by-side stat tables ── */
    .sp-side-tables { display: grid; grid-template-columns: 1fr 2fr 2fr; gap: 1rem; margin-bottom: 1rem; }
    @media (max-width: 600px) { .sp-side-tables { grid-template-columns: 1fr; } }

    .sp-stats-box { display: flex; flex-direction: column; padding: 0 0 0.5rem; }
    .sp-stat-row { display: flex; justify-content: space-between; align-items: baseline; padding: 0.45rem 0.85rem; border-top: 1px solid var(--border); gap: 0.5rem; }
    .sp-stat-label { font-size: 0.78rem; color: var(--text-muted); }
    .sp-stat-big { font-size: 1.5rem; font-weight: 800; color: var(--accent); font-variant-numeric: tabular-nums; }
    .sp-stat-num { font-size: 0.92rem; font-weight: 700; color: var(--accent); font-variant-numeric: tabular-nums; }
    .sp-stat-proj { border-top: 2px solid var(--border); }

    .sp-mini-table-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }

    .sp-mini-table-box h3 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--accent);
      padding: 0.6rem 0.85rem 0.4rem;
      border-bottom: 1px solid var(--border);
    }

    .sp-mini-empty { font-size: 0.85rem; color: var(--text-muted); padding: 0.75rem 0.85rem; }
    .sp-mini-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .sp-mini-table td { padding: 0.35rem 0.85rem; border-top: 1px solid var(--border); }
    .sp-mini-table tbody tr:hover { background: var(--surface2); }
    .sp-mini-rank { color: var(--text-muted); width: 2rem; font-variant-numeric: tabular-nums; }
    .sp-mini-top td { color: var(--gold); font-weight: 700; }
    .sp-mini-top .sp-mini-rank { color: var(--gold); }
    .sp-mini-top .sp-mini-val  { color: var(--gold); }
    .sp-mini-val  { text-align: right; font-weight: 700; color: var(--accent); font-variant-numeric: tabular-nums; width: 3rem; }

    .empty, .error { text-align: center; padding: 3rem; color: var(--text-muted); }
    .error { color: var(--red); }
  </style>
