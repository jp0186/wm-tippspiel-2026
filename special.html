<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WM Tippspiel 2026 — Spezialtipps</title>
  <style>
    :root {
      --bg: #0a0e1a;
      --surface: #131929;
      --surface2: #1c2540;
      --border: #2a3555;
      --text: #e8eaf6;
      --text-muted: #8892b0;
      --green: #4ade80;
      --yellow: #fbbf24;
      --red: #f87171;
      --accent: #4f86f7;
      --radius: 10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", system-ui, sans-serif;
      min-height: 100vh;
    }

    header {
      background: #f5f5f0;
      padding: 1.25rem 1.5rem 1rem;
      text-align: center;
    }

    header img.logo {
      height: 216px;
      width: 216px;
      object-fit: contain;
      display: block;
      margin: 0 auto;
    }

    nav {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
      padding: 0.75rem 1rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    nav a {
      color: var(--text-muted);
      text-decoration: none;
      padding: 0.4rem 1rem;
      border-radius: 6px;
      font-size: 0.9rem;
      transition: all 0.15s;
    }

    nav a:hover, nav a.active { background: var(--accent); color: #fff; }

    main { max-width: 960px; margin: 2rem auto; padding: 0 1rem; }

    #status {
      text-align: right;
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-bottom: 1rem;
    }

    /* ── Scrollable wrapper for wide table ── */
    .sp-scroll {
      overflow-x: auto;
      border-radius: var(--radius);
    }

    .special-table {
      width: max-content;
      min-width: 100%;
      border-collapse: collapse;
      background: var(--surface);
      font-size: 0.88rem;
      white-space: nowrap;
    }

    /* Phase header row */
    .special-table thead tr:first-child { background: #0f1628; }
    .special-table thead tr:last-child  { background: var(--surface2); }

    .special-table th {
      padding: 0.55rem 0.85rem;
      text-align: center;
      font-size: 0.73rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      border-right: 1px solid var(--border);
      vertical-align: bottom;
    }

    .special-table th:last-child { border-right: none; }

    th.sp-phase {
      color: var(--accent);
      font-size: 0.7rem;
      border-bottom: 2px solid var(--border);
      padding-bottom: 0.45rem;
    }

    th.sp-phase + th.sp-phase,
    th.sp-total-hdr { border-left: 2px solid var(--border); }

    th.sp-player-hdr {
      text-align: left;
      color: var(--text-muted);
      border-right: 2px solid var(--border);
    }

    .special-table th small {
      display: block;
      font-size: 0.68rem;
      color: var(--text-muted);
      text-transform: none;
      letter-spacing: 0;
      margin-top: 0.15rem;
      opacity: 0.7;
    }

    /* Body */
    .special-table td {
      padding: 0.55rem 0.85rem;
      border-top: 1px solid var(--border);
      border-right: 1px solid var(--border);
      text-align: center;
      vertical-align: middle;
    }

    .special-table td:last-child { border-right: none; }
    .special-table tbody tr:hover { background: var(--surface2); }

    td.sp-player {
      text-align: left;
      font-weight: 600;
      color: var(--text);
      border-right: 2px solid var(--border);
    }

    /* Phase column dividers */
    .special-table td:nth-child(5),
    .special-table td:nth-child(6),
    .special-table td:nth-child(8) { border-left: 2px solid var(--border); }

    .sp-cell { font-variant-numeric: tabular-nums; }
    .sp-cell.scored { color: var(--green); font-weight: 600; }
    .sp-cell.miss   { color: var(--text-muted); }
    .sp-cell.empty  { color: var(--border); }
    .sp-cell.total  { color: var(--accent); font-weight: 700; font-size: 1rem; }

    .sp-cell em {
      font-style: normal;
      font-size: 0.75em;
      margin-left: 0.3em;
      opacity: 0.85;
    }

    .empty, .error { text-align: center; padding: 3rem; color: var(--text-muted); }
    .error { color: var(--red); }
  </style>
</head>

<body>
  <header>
    <img src="img/logo.png" alt="WM Tippspiel Logo" class="logo">
  </header>

  <nav>
    <a href="index.html">🏆 Rangliste</a>
    <a href="results.html">📋 Tipps / Ergebnisse</a>
    <a href="special.html" class="active">⭐ Spezialtipps</a>
    <a href="players.html">👥 Mitspieler</a>
    <a href="regelwerk.html">📜 Regeln</a>
  </nav>

  <main>
    <div id="status"></div>
    <div id="special-container">
      <p class="empty">Lade Daten …</p>
    </div>
  </main>

  <script src="js/app.js?v=3"></script>
  <script>
    autoRefresh(renderSpecial);
  </script>
</body>

</html>
