<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WM Tippspiel 2026 — Spieler</title>
  <style>
    :root {
      --bg: #0a0e1a;
      --surface: #131929;
      --surface2: #1c2540;
      --border: #2a3555;
      --text: #e8eaf6;
      --text-muted: #8892b0;
      --gold: #f5c518;
      --green: #4ade80;
      --accent: #4f86f7;
      --radius: 10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", system-ui, sans-serif;
      min-height: 100vh;
    }

    header {
      background: #f5f5f0;
      padding: 1.5rem 1.5rem 1.25rem;
      text-align: center;
    }

    header img.logo {
      height: 216px;
      width: 216px;
      object-fit: contain;
      display: block;
      margin: 0 auto;
    }

    nav {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      padding: 0.75rem 1rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }

    nav a {
      color: var(--text-muted);
      text-decoration: none;
      padding: 0.4rem 1rem;
      border-radius: 6px;
      font-size: 0.9rem;
      transition: all 0.15s;
    }

    nav a:hover, nav a.active { background: var(--accent); color: #fff; }

    main { max-width: 720px; margin: 2rem auto; padding: 0 1rem; }

    #status {
      text-align: right;
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-bottom: 1rem;
    }

    /* ── Player header ───────────── */
    .pd-header {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      margin-bottom: 1.75rem;
    }

    .pd-photo {
      width: 140px;
      height: auto;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      flex-shrink: 0;
      display: block;
    }

    .pd-name {
      font-size: clamp(1.4rem, 5vw, 2rem);
      font-weight: 800;
    }

    .pd-rank {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-top: 0.3rem;
    }

    /* ── Stats grid ──────────────── */
    .pd-stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.75rem;
      margin-bottom: 2rem;
    }

    .pd-stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.75rem 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.2rem;
    }

    .pd-stat-val {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--accent);
    }

    .pd-stat-label {
      font-size: 0.72rem;
      color: var(--text-muted);
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .pd-tooltip-wrap {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 1em;
      height: 1em;
      font-size: 0.65rem;
      font-weight: 700;
      background: var(--border);
      color: var(--text-muted);
      border-radius: 50%;
      cursor: default;
      position: relative;
      vertical-align: middle;
      margin-left: 0.2em;
    }

    .pd-tooltip {
      display: none;
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.45rem 0.65rem;
      font-size: 0.72rem;
      font-weight: 400;
      color: var(--text);
      white-space: normal;
      width: 14rem;
      text-align: center;
      text-transform: none;
      letter-spacing: 0;
      z-index: 10;
      pointer-events: none;
    }

    .pd-tooltip-wrap:hover .pd-tooltip { display: block; }

    .pd-stat-rank {
      font-size: 0.68rem;
      font-weight: 700;
      color: var(--accent);
      margin-top: 0.15rem;
      opacity: 0.75;
    }

    /* ── Spezialtipps ────────────── */
    .pd-section-title {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
    }

    .pd-sp-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--surface);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .pd-sp-table tr { border-bottom: 1px solid var(--border); }
    .pd-sp-table tr:last-child { border-bottom: none; }

    .pd-sp-label {
      padding: 0.6rem 1rem;
      color: var(--text-muted);
      font-size: 0.85rem;
      width: 55%;
    }

    .pd-sp-val {
      padding: 0.6rem 1rem;
      font-size: 0.9rem;
      font-weight: 500;
    }

    .pd-sp-val em.scored {
      font-style: normal;
      color: var(--green);
      font-weight: 700;
      margin-left: 0.4rem;
    }

    /* ── Scored tips box ─────────── */
    .pd-scored-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .pd-scored-row {
      display: grid;
      grid-template-columns: 2.5rem 1fr auto auto auto;
      align-items: center;
      gap: 0.5rem 0.75rem;
      padding: 0.5rem 1rem;
      border-top: 1px solid var(--border);
      font-size: 0.88rem;
    }

    .pd-scored-row:first-child { border-top: none; }
    .pd-scored-row:hover { background: var(--surface2); }

    .pd-scored-date { color: var(--text-muted); font-size: 0.78rem; white-space: nowrap; }
    .pd-scored-match { font-weight: 500; }
    .pd-scored-result { color: var(--text); font-variant-numeric: tabular-nums; white-space: nowrap; }
    .pd-scored-tip { color: var(--text-muted); font-variant-numeric: tabular-nums; white-space: nowrap; }
    .pd-scored-label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text-muted); opacity: 0.6; margin-right: 0.15em; }
    .pd-scored-pts { font-weight: 700; white-space: nowrap; text-align: right; }
    .pd-scored-pts.exact   { color: var(--green); }
    .pd-scored-pts.outcome { color: #fbbf24; }

    .vs { font-weight: 400; color: var(--text-muted); margin: 0 0.2em; }

    .empty, .error { text-align: center; padding: 3rem; color: var(--text-muted); }
    .error { color: #f87171; }

    @media (max-width: 480px) {
      .pd-stats-grid { grid-template-columns: repeat(2, 1fr); }
      .pd-header { flex-direction: column; text-align: center; }
    }
  </style>

</head>
