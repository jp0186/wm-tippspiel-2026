<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WM Tippspiel 2026 — Mitspieler</title>
  <style>
    :root {
      --bg: #0a0e1a;
      --surface: #131929;
      --surface2: #1c2540;
      --border: #2a3555;
      --text: #e8eaf6;
      --text-muted: #8892b0;
      --gold: #f5c518;
      --accent: #4f86f7;
      --radius: 10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", system-ui, sans-serif;
      min-height: 100vh;
    }

    header {
      background: #f5f5f0;
      padding: 1.5rem 1.5rem 1.25rem;
      text-align: center;
    }

    header img.logo {
      height: 216px;
      width: 216px;
      object-fit: contain;
      display: block;
      margin: 0 auto;
    }

    nav {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      padding: 0.75rem 1rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }

    nav a {
      color: var(--text-muted);
      text-decoration: none;
      padding: 0.4rem 1rem;
      border-radius: 6px;
      font-size: 0.9rem;
      transition: all 0.15s;
    }

    nav a:hover, nav a.active { background: var(--accent); color: #fff; }

    main { max-width: 860px; margin: 2rem auto; padding: 0 1rem; }

    #status {
      text-align: right;
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-bottom: 1rem;
    }

    .tree-hint {
      font-size: 0.82rem;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
    }

    #tree-container {
      width: 100%;
      height: 75vh;
      min-height: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    /* ── genogram ── */
    .genogram-svg { display: block; width: 100%; height: 100%; cursor: grab; }
    .genogram-svg:active { cursor: grabbing; }
    .geno-link { fill: none; stroke: var(--border); stroke-width: 1.5; }

    .geno-card-inner {
      box-sizing: border-box;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 4px 4px 0;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .geno-player .geno-card-inner { border-color: var(--accent); }

    .geno-img-wrap {
      width: 100%;
      height: var(--img-h);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .geno-img { width: 100%; height: 100%; object-fit: cover; border-radius: 6px; }

    .geno-silhouette { width: 64%; color: var(--text-muted); opacity: 0.5; }
    .geno-silhouette svg { width: 100%; height: auto; }

    .geno-name {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text);
      margin-top: 3px;
      text-align: center;
      line-height: 1.1;
    }

    .geno-relative .geno-name { color: var(--text-muted); font-weight: 500; }
    .geno-pts { font-size: 0.72rem; color: var(--accent); font-weight: 700; font-variant-numeric: tabular-nums; }
    .geno-card:hover .geno-card-inner { background: var(--border); }

    .empty, .error { text-align: center; padding: 3rem; color: var(--text-muted); }
    .error { color: #f87171; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dagre@0.8.5/dist/dagre.min.js"></script>
  <script defer src="https://cloud.umami.is/script.js" data-website-id="917373df-77e7-427a-8a7a-337d96ad28a3"></script>
</head>

<body>
  <header>
    <img src="img/logo.png" alt="WM Tippspiel Logo" class="logo">
  </header>

  <nav>
    <a href="index.html">🏆 Rangliste</a>
    <a href="results.html">📋 Tipps / Ergebnisse</a>
    <a href="special.html">⭐ Spezialtipps</a>
    <a href="players.html" class="active">👥 Mitspieler</a>
    <a href="regelwerk.html">📜 Regeln</a>
  </nav>

  <main>
    <div id="status"></div>
    <p class="tree-hint">Zoomen mit Scrollen/Pinch, verschieben durch Ziehen. Tippe auf einen Mitspieler für Details.</p>
    <div id="tree-container"><p class="empty">Lade Stammbaum …</p></div>
  </main>

  <script src="js/app.js?v=8"></script>
  <script>renderFamilyTree();</script>
</body>

</html>
