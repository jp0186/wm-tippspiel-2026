<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WM Tippspiel 2026 — Mitspieler</title>
  <style>
    :root {
      --bg: #0a0e1a;
      --surface: #131929;
      --surface2: #1c2540;
      --border: #2a3555;
      --text: #e8eaf6;
      --text-muted: #8892b0;
      --gold: #f5c518;
      --accent: #4f86f7;
      --radius: 10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", system-ui, sans-serif;
      min-height: 100vh;
    }

    header {
      background: #f5f5f0;
      padding: 1.5rem 1.5rem 1.25rem;
      text-align: center;
    }

    header img.logo {
      height: 216px;
      width: 216px;
      object-fit: contain;
      display: block;
      margin: 0 auto;
    }

    nav {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      padding: 0.75rem 1rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }

    nav a {
      color: var(--text-muted);
      text-decoration: none;
      padding: 0.4rem 1rem;
      border-radius: 6px;
      font-size: 0.9rem;
      transition: all 0.15s;
    }

    nav a:hover, nav a.active { background: var(--accent); color: #fff; }

    main { max-width: 860px; margin: 2rem auto; padding: 0 1rem; }

    #status {
      text-align: right;
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-bottom: 1rem;
    }

    .players-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 1.25rem;
    }

    .player-tile {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      text-decoration: none;
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: border-color 0.15s, transform 0.15s;
    }

    .player-tile:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .player-tile img {
      width: 100%;
      aspect-ratio: 3 / 4;
      object-fit: contain;
      background: var(--surface2);
      display: block;
    }

    .player-tile-name {
      font-weight: 600;
      font-size: 0.95rem;
      padding: 0.5rem 0.5rem 0.2rem;
      text-align: center;
    }

    .player-tile-pts {
      font-size: 0.8rem;
      color: var(--text-muted);
      padding-bottom: 0.6rem;
    }

    .empty, .error { text-align: center; padding: 3rem; color: var(--text-muted); }
    .error { color: #f87171; }
  </style>
</head>

<body>
  <header>
    <img src="img/logo.png" alt="WM Tippspiel Logo" class="logo">
  </header>

  <nav>
    <a href="index.html">🏆 Rangliste</a>
    <a href="results.html">📋 Tipps / Ergebnisse</a>
    <a href="special.html">⭐ Spezialtipps</a>
    <a href="players.html" class="active">👥 Mitspieler</a>
  </nav>

  <main>
    <div id="status"></div>
    <div id="players-container"><p class="empty">Lade Daten …</p></div>
  </main>

  <script src="js/app.js?v=3"></script>
  <script>autoRefresh(renderPlayers);</script>
</body>

</html>
