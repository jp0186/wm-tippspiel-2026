<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WM Tippspiel 2026</title>
  <style>
    :root {
      --bg: #0a0e1a;
      --surface: #131929;
      --surface2: #1c2540;
      --border: #2a3555;
      --text: #e8eaf6;
      --text-muted: #8892b0;
      --gold: #f5c518;
      --silver: #c0c7d4;
      --bronze: #cd7f32;
      --green: #4ade80;
      --accent: #4f86f7;
      --radius: 10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", system-ui, sans-serif;
      min-height: 100vh;
    }

    header {
      background: #f5f5f0;
      padding: 1.5rem 1.5rem 1.25rem;
      text-align: center;
    }

    header img.logo {
      height: 216px;
      width: 216px;
      object-fit: contain;
      display: block;
      margin: 0 auto;
    }

    nav {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      padding: 0.75rem 1rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    nav a {
      color: var(--text-muted);
      text-decoration: none;
      padding: 0.4rem 1rem;
      border-radius: 6px;
      font-size: 0.9rem;
      transition: all 0.15s;
    }

    nav a:hover, nav a.active {
      background: var(--accent);
      color: #fff;
    }

    main {
      max-width: 860px;
      margin: 2rem auto;
      padding: 0 1rem;
    }

    #status {
      text-align: right;
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-bottom: 1rem;
    }

    /* ── Today's matches with tips ─────────────────── */
    .today-section {
      margin-bottom: 2rem;
    }

    .today-section h3 {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
    }

    .today-match-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 0.75rem;
      overflow: hidden;
    }

    .today-match-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.6rem 1rem;
      background: var(--surface2);
      flex-wrap: wrap;
    }

    .today-match-teams { flex: 1; font-weight: 600; font-size: 0.95rem; }

    .today-match-result {
      font-size: 1.1rem;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      min-width: 3rem;
      text-align: right;
    }

    .today-match-result.final  { color: var(--green); }
    .today-match-result.pending { color: var(--text-muted); }

    .today-tips-table { width: 100%; border-collapse: collapse; }

    .today-tips-table td {
      padding: 0.35rem 1rem;
      border-top: 1px solid var(--border);
      font-size: 0.88rem;
    }

    .today-tip-player { color: var(--text); }

    .today-tip-pts {
      text-align: right;
      font-weight: 700;
      width: 5rem;
    }

    .today-tip-pts.exact   { color: var(--green); }
    .today-tip-pts.outcome { color: var(--yellow); }
    .today-tip-pts.miss    { color: var(--red); }
    .today-tip-pts.no-result { color: var(--text-muted); }

    /* ── Upcoming matches ───────────────────────────── */
    .upcoming-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      margin-bottom: 1.75rem;
    }

    .upcoming-section h3 {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .countdown-badge {
      background: var(--accent);
      color: #fff;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 0.15em 0.55em;
      border-radius: 20px;
      letter-spacing: 0.03em;
      text-transform: none;
    }

    .upcoming-list {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .upcoming-match {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.92rem;
      padding: 0.25rem 0;
    }

    .upcoming-teams { flex: 1; }
    .vs { color: var(--text-muted); margin: 0 0.3em; }

    .upcoming-time {
      color: var(--text-muted);
      font-size: 0.82rem;
      white-space: nowrap;
      margin-left: 1rem;
    }

    .upcoming-time.final { color: var(--green); font-weight: 600; }
    .upcoming-done { color: var(--text-muted); font-size: 0.9rem; }

    /* ── Leaderboard ────────────────────────────────── */
    .leaderboard-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--surface);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.3);
    }

    .leaderboard-table thead tr { background: var(--surface2); }

    .leaderboard-table th,
    .leaderboard-table td {
      padding: 0.8rem 1rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    .leaderboard-table th {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
    }

    .leaderboard-table tbody tr:last-child td { border-bottom: none; }
    .leaderboard-table tbody tr:hover { background: var(--surface2); }

    .rank-cell { font-size: 1.2rem; text-align: center; width: 3rem; }
    .name-cell { font-weight: 600; font-size: 1.05rem; }

    .pts-cell { text-align: right; font-variant-numeric: tabular-nums; }
    .pts-cell.total { font-size: 1.25rem; font-weight: 700; color: var(--accent); }

    tr.rank-1 .name-cell { color: var(--gold); }
    tr.rank-2 .name-cell { color: var(--silver); }
    tr.rank-3 .name-cell { color: var(--bronze); }

    .empty, .error { text-align: center; padding: 3rem; color: var(--text-muted); }
    .error { color: #f87171; }

    /* ── News feed ──────────────────────────────────── */
    .news-section {
      margin-top: 2rem;
    }

    .news-section h3 {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
    }

    .news-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.75rem 1rem;
      margin-bottom: 0.6rem;
    }

    .news-timestamp {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-bottom: 0.25rem;
    }

    .news-message {
      font-size: 0.95rem;
      line-height: 1.5;
    }

    @media (max-width: 500px) {
      .leaderboard-table th:nth-child(4),
      .leaderboard-table td:nth-child(4),
      .leaderboard-table th:nth-child(5),
      .leaderboard-table td:nth-child(5) { display: none; }
    }
  </style>
</head>

<body>
  <header>
    <img src="img/logo.png" alt="WM Tippspiel Logo" class="logo">
  </header>

  <nav>
    <a href="index.html" class="active">🏆 Rangliste</a>
    <a href="results.html">📋 Tipps / Ergebnisse</a>
    <a href="special.html">⭐ Spezialtipps</a>
    <a href="players.html">👥 Mitspieler</a>
  </nav>

  <main>
    <div id="status"></div>
    <div id="upcoming-container"></div>
    <div id="today-container"></div>

    <div id="leaderboard-container">
      <p class="empty">Lade Daten …</p>
    </div>
    <div id="news-container"></div>
  </main>

  <script src="js/app.js?v=3"></script>
  <script>
    autoRefresh(renderLeaderboard);
  </script>
</body>

</html>
