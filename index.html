<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WM Tippspiel 2026</title>
  <style>
    :root {
      --bg: #0a0e1a;
      --surface: #131929;
      --surface2: #1c2540;
      --border: #2a3555;
      --text: #e8eaf6;
      --text-muted: #8892b0;
      --gold: #f5c518;
      --silver: #c0c7d4;
      --bronze: #cd7f32;
      --green: #4ade80;
      --yellow: #fbbf24;
      --red: #f87171;
      --accent: #4f86f7;
      --radius: 10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", system-ui, sans-serif;
      min-height: 100vh;
    }

    header {
      background: #f5f5f0;
      padding: 1.5rem 1.5rem 1.25rem;
      text-align: center;
    }

    header img.logo {
      height: 216px;
      width: 216px;
      object-fit: contain;
      display: block;
      margin: 0 auto;
    }

    nav {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
      padding: 0.75rem 1rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    nav a {
      color: var(--text-muted);
      text-decoration: none;
      padding: 0.4rem 1rem;
      border-radius: 6px;
      font-size: 0.9rem;
      transition: all 0.15s;
    }

    nav a:hover, nav a.active {
      background: var(--accent);
      color: #fff;
    }

    main {
      max-width: 860px;
      margin: 2rem auto;
      padding: 0 1rem;
    }

    #status {
      text-align: right;
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-bottom: 1rem;
    }

    /* ── Today's matches with tips ─────────────────── */
    .today-section {
      margin-bottom: 2rem;
    }

    .today-section h3 {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
    }

    .today-matches-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.75rem; margin-bottom: 0.5rem; }
    @media (max-width: 600px) { .today-matches-grid { grid-template-columns: 1fr; } }
    .today-matches-list { display: flex; flex-direction: column; gap: 0.5rem; }

    .today-match-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 0.75rem;
      overflow: hidden;
    }

    .today-match-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.6rem 1rem;
      background: var(--surface2);
      flex-wrap: wrap;
      cursor: pointer;
      user-select: none;
    }

    .tm-chevron { font-size: 0.9rem; color: var(--text-muted); margin-left: auto; transition: transform 0.15s; }
    .today-match-card.tm-collapsed .tm-chevron { transform: rotate(-90deg); }
    .today-match-card.tm-collapsed .today-tips-table { display: none; }

    .today-match-teams { flex: 1; font-weight: 600; font-size: 0.95rem; }

    .today-match-result {
      font-size: 1.1rem;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      min-width: 3rem;
      text-align: right;
    }

    .today-match-result.final  { color: var(--green); }
    .today-match-result.pending { color: var(--text-muted); }

    .today-tips-table { width: 100%; border-collapse: collapse; }
    .today-tips-table tbody tr:hover { background: var(--surface2); }

    .today-tips-table td {
      padding: 0.35rem 1rem;
      border-top: 1px solid var(--border);
      font-size: 0.88rem;
    }

    .today-tip-player { color: var(--text); }

    .today-tip-str {
      text-align: right;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      width: 3.5rem;
    }

    .today-tip-pts {
      text-align: right;
      font-weight: 700;
      white-space: nowrap;
      width: 4rem;
    }

    .today-tip-pts .exact   { color: var(--green); }
    .today-tip-pts .outcome { color: var(--yellow); }
    .today-tip-pts .miss    { color: var(--red); }
    .today-tip-pts .no-result { color: var(--text-muted); }

    .live-badge {
      display: inline-block;
      background: #ef4444;
      color: #fff;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 0.1em 0.5em;
      border-radius: 20px;
      letter-spacing: 0.05em;
      margin-left: 0.4rem;
      vertical-align: middle;
      animation: livepulse 1.4s ease-in-out infinite;
    }

    @keyframes livepulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* ── Upcoming matches ───────────────────────────── */
    .upcoming-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      margin-bottom: 1.75rem;
    }

    .upcoming-section h3 {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .countdown-badge {
      background: var(--accent);
      color: #fff;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 0.15em 0.55em;
      border-radius: 20px;
      letter-spacing: 0.03em;
      text-transform: none;
    }

    .upcoming-list {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .upcoming-match {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.92rem;
      padding: 0.25rem 0;
    }

    .upcoming-teams { flex: 1; }
    .vs { color: var(--text-muted); margin: 0 0.3em; }

    .upcoming-time {
      color: var(--text-muted);
      font-size: 0.82rem;
      white-space: nowrap;
      margin-left: 1rem;
    }

    .upcoming-time.final { color: var(--green); font-weight: 600; }
    .upcoming-done { color: var(--text-muted); font-size: 0.9rem; }

    /* ── Leaderboard ────────────────────────────────── */
    .leaderboard-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--surface);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.3);
    }

    .leaderboard-table thead tr { background: var(--surface2); }

    .leaderboard-table th,
    .leaderboard-table td {
      padding: 0.8rem 1rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    .leaderboard-table th {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
    }

    .leaderboard-table tbody tr:last-child td { border-bottom: none; }
    .leaderboard-table tbody tr:hover { background: var(--surface2); }

    .rank-cell { font-size: 1.2rem; text-align: center; width: 3rem; }
    .name-cell { font-weight: 600; font-size: 1.05rem; }

    .pts-cell { text-align: right; font-variant-numeric: tabular-nums; }
    .pts-cell.total { font-size: 1.25rem; font-weight: 700; color: var(--accent); }

    tr.rank-1 .name-cell { color: var(--gold); }
    tr.rank-2 .name-cell { color: var(--silver); }
    tr.rank-3 .name-cell { color: var(--bronze); }

    /* ── Phase 2: knockout dashboard ────────────────── */
    .round-section, .ks-box, .semi-box { margin-bottom: 1.75rem; }

    .round-section h3, .ks-box h3, .semi-box h3 {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
    }
    .round-section h3 small, .ks-box h3 small, .semi-box h3 small {
      text-transform: none;
      letter-spacing: 0;
      color: var(--text-muted);
      font-weight: 400;
      margin-left: 0.3rem;
    }

    .round-tiles {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.6rem;
    }
    @media (max-width: 600px) { .round-tiles { grid-template-columns: minmax(0, 1fr); } }

    .round-tile {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.55rem 0.85rem;
    }
    .round-tile.done { border-color: #2f6d46; }

    .rt-meta { font-size: 0.72rem; color: var(--text-muted); margin-bottom: 0.35rem; }

    .rt-teams { display: flex; align-items: center; gap: 0.5rem; }
    .rt-side { flex: 1; display: flex; align-items: center; gap: 0.4rem; min-width: 0; }
    .rt-side.rt-away { justify-content: flex-end; text-align: right; }
    .rt-flag { font-size: 1.1rem; flex-shrink: 0; }
    .rt-name { font-weight: 600; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .rt-score {
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      color: var(--text-muted);
      min-width: 2.6rem;
      text-align: center;
    }
    .round-tile.done .rt-score { color: var(--green); }
    .rt-pens {
      margin-top: 0.3rem;
      text-align: center;
      font-size: 0.72rem;
      font-variant-numeric: tabular-nums;
      color: var(--text-muted);
    }
    .rt-side.elim .rt-name { text-decoration: line-through; }
    .rt-side.elim { opacity: 0.5; }

    .ks-box, .semi-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
    }

    .ks-table { width: 100%; border-collapse: collapse; }
    .ks-table td { padding: 0.3rem 0.4rem; border-top: 1px solid var(--border); font-size: 0.9rem; }
    .ks-table tr:first-child td { border-top: none; }
    .ks-rank { width: 1.8rem; color: var(--text-muted); text-align: center; }
    .ks-val { text-align: right; font-weight: 700; font-variant-numeric: tabular-nums; width: 2.5rem; }
    .ks-team { color: var(--text-muted); font-size: 0.82rem; }
    .ks-top td { color: var(--gold); }
    .ks-top .ks-team { color: var(--gold); opacity: 0.8; }

    .semi-list { display: flex; flex-direction: column; gap: 0.6rem; }
    .semi-row { border-bottom: 1px solid var(--border); padding-bottom: 0.6rem; }
    .semi-row:last-child { border-bottom: none; padding-bottom: 0; }
    .semi-row-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 0.4rem; }
    .semi-player { font-weight: 600; font-size: 0.95rem; }
    .semi-pts { font-weight: 700; color: var(--accent); font-variant-numeric: tabular-nums; font-size: 0.85rem; }
    .semi-picks { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 0.4rem; }
    @media (max-width: 600px) { .semi-picks { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
    .semi-cell {
      background: var(--surface2);
      border-radius: 6px;
      padding: 0.3rem 0.5rem;
      font-size: 0.85rem;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .semi-cell.dead { color: var(--text-muted); text-decoration: line-through; opacity: 0.55; }
    .semi-cell.empty { color: var(--text-muted); background: transparent; }
    .semi-cell.correct { color: var(--green); font-weight: 700; background: rgba(47, 109, 70, 0.18); }

    /* ── Final results banner ───────────────────────── */
    .fb-wrap { margin-bottom: 2rem; }

    .fb-champ {
      position: relative; text-align: center; overflow: hidden;
      padding: 2.2rem 1.5rem 1.9rem; border-radius: 16px;
      background:
        radial-gradient(120% 140% at 50% 0%, rgba(245,197,24,0.18) 0%, rgba(245,197,24,0.03) 45%, transparent 70%),
        var(--surface);
      border: 1px solid rgba(245,197,24,0.35);
      box-shadow: 0 0 60px rgba(245,197,24,0.10);
      animation: fbRise 0.6s ease both;
    }
    .fb-trophy { font-size: 2.6rem; line-height: 1; filter: drop-shadow(0 4px 14px rgba(245,197,24,0.5)); animation: fbFloat 3.5s ease-in-out infinite; }
    .fb-eyebrow { margin-top: 0.7rem; font-size: 0.8rem; font-weight: 700; letter-spacing: 0.28em; text-transform: uppercase; color: var(--gold); }
    .fb-champ-name { margin-top: 0.3rem; font-size: clamp(2rem, 6vw, 2.9rem); font-weight: 800; letter-spacing: -0.01em; text-wrap: balance; }
    .fb-champ-points { margin-top: 0.4rem; font-size: 1.35rem; font-weight: 800; font-variant-numeric: tabular-nums; color: var(--gold); }
    .fb-champ-final { margin-top: 0.5rem; font-size: 0.88rem; color: var(--text-muted); }

    .fb-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1rem; }
    @media (max-width: 560px) { .fb-cards { grid-template-columns: 1fr; } }
    .fb-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.1rem 1.25rem; animation: fbRise 0.6s ease both; }
    .fb-card-label { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); display: flex; align-items: center; gap: 0.45rem; }
    .fb-card-main { margin-top: 0.7rem; }
    .fb-card-name { font-size: 1.35rem; font-weight: 700; }
    .fb-flag { font-size: 1.1em; }
    .fb-card-second { margin-top: 0.45rem; }
    .fb-sub { font-size: 0.86rem; color: var(--text-muted); }
    .fb-tie { font-size: 0.68rem; font-weight: 700; letter-spacing: 0.04em; color: var(--gold); border: 1px solid rgba(245,197,24,0.4); border-radius: 20px; padding: 0.05em 0.5em; }
    .fb-ts-list { margin-top: 0.7rem; display: flex; flex-direction: column; gap: 0.5rem; }
    .fb-ts-entry { display: flex; align-items: baseline; gap: 0.5rem; flex-wrap: wrap; padding: 0.5rem 0.65rem; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; }
    .fb-ts-name { font-size: 1.1rem; font-weight: 700; }
    .fb-badge { margin-left: auto; font-variant-numeric: tabular-nums; font-weight: 800; font-size: 1.02rem; color: var(--gold); white-space: nowrap; }

    .fb-podium-box { margin-top: 1.75rem; }
    .fb-section-h { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-muted); margin-bottom: 0.9rem; }
    .fb-podium { display: grid; grid-template-columns: 1fr 1.15fr 1fr; gap: 0.7rem; align-items: end; }
    .fb-step { position: relative; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem 0.75rem; text-align: center; }
    .fb-medal { font-size: 1.5rem; line-height: 1; }
    .fb-who { margin-top: 0.4rem; font-weight: 700; font-size: 1.02rem; }
    .fb-score { margin-top: 0.1rem; font-variant-numeric: tabular-nums; color: var(--text-muted); font-size: 0.85rem; }
    .fb-score b { color: var(--accent); font-size: 1.15rem; }
    .fb-step.p1 { border-color: rgba(245,197,24,0.5); background: linear-gradient(180deg, rgba(245,197,24,0.10), var(--surface)); padding-top: 1.5rem; }
    .fb-step.p1 .fb-medal { font-size: 1.9rem; }
    .fb-step.p2 { border-color: rgba(192,199,212,0.35); }
    .fb-step.p3 { border-color: rgba(205,127,50,0.35); }
    .fb-rankno { position: absolute; top: 0.5rem; left: 0.6rem; font-size: 0.72rem; color: var(--text-muted); font-weight: 700; }

    .fb-tipped { margin-top: 1.6rem; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 0.5rem 1.25rem; }
    .fb-tipped-row { display: flex; flex-wrap: wrap; align-items: center; gap: 0.5rem; padding: 0.6rem 0; }
    .fb-tipped-row + .fb-tipped-row { border-top: 1px solid var(--border); }
    .fb-tipped-key { font-size: 0.85rem; color: var(--text-muted); min-width: 13rem; }
    .fb-tipped-key b { color: var(--text); }
    .fb-chip { font-size: 0.8rem; font-weight: 600; background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 0.2em 0.7em; }
    .fb-chip .fb-plus { color: var(--green); font-weight: 700; margin-left: 0.25em; }
    .fb-chip.none { color: var(--text-muted); font-style: italic; border-style: dashed; }

    .fb-farewell { margin-top: 2rem; border: 1px dashed rgba(245,197,24,0.45); border-radius: var(--radius); padding: 1.25rem 1.4rem; background: rgba(245,197,24,0.04); font-size: 0.98rem; line-height: 1.65; color: var(--text); text-wrap: pretty; }
    .fb-fw-icon { font-size: 1.15rem; margin-right: 0.35rem; }
    .fb-farewell b { color: var(--gold); font-weight: 700; }

    @keyframes fbRise { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }
    @keyframes fbFloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
    @media (prefers-reduced-motion: reduce) { .fb-champ, .fb-card, .fb-trophy { animation: none; } }

    /* ── Phase 2: special-points emphasis ───────────── */
    .phase-banner {
      background: linear-gradient(90deg, rgba(245,197,24,0.18), rgba(245,197,24,0.06));
      border: 1px solid var(--gold);
      border-radius: var(--radius);
      color: var(--text);
      padding: 0.7rem 1rem;
      margin-bottom: 1rem;
      font-size: 0.92rem;
      font-weight: 600;
    }

    .phase-banner a { color: var(--gold); text-decoration: none; white-space: nowrap; }
    .phase-banner a:hover { text-decoration: underline; }

    .leaderboard-table th.sp-emphasis { color: var(--gold); }

    .pts-cell.sp-emphasis {
      color: var(--gold);
      font-weight: 700;
      background: rgba(245,197,24,0.07);
    }

    .empty, .error { text-align: center; padding: 3rem; color: var(--text-muted); }
    .error { color: #f87171; }
    a.player-link { color: inherit; text-decoration: none; }
    a.player-link:hover { text-decoration: underline; color: var(--accent); }

    /* ── News feed ──────────────────────────────────── */
    .news-section {
      margin-top: 2rem;
    }

    .news-section h3 {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
    }

    .news-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.75rem 1rem;
      margin-bottom: 0.6rem;
    }

    .news-timestamp {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-align: right;
      margin-bottom: 0.5rem;
    }

    .news-heading {
      font-weight: 700;
      font-size: 1rem;
      padding-bottom: 0.5rem;
      margin-bottom: 0.6rem;
      border-bottom: 1px solid var(--border);
    }

    .news-message p {
      font-size: 0.95rem;
      line-height: 1.5;
      margin: 0 0 0.5rem;
    }

    .news-message p:last-child { margin-bottom: 0; }

    /* ── Progress chart ─────────────────────────────── */
    .chart-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem 0.75rem;
      margin-top: 1.75rem;
    }

    .chart-box h3 {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
    }

    /* Square-ish chart so mobile and desktop share a ~1:1 aspect ratio. */
    .chart-canvas-wrap { position: relative; width: 100%; aspect-ratio: 1 / 1; max-height: 760px; }
    .chart-box canvas { display: block; }

    @media (max-width: 500px) {
      .leaderboard-table th:nth-child(4),
      .leaderboard-table td:nth-child(4),
      .leaderboard-table th:nth-child(5),
      .leaderboard-table td:nth-child(5) { display: none; }
    }
  </style>
  <script defer src="https://cloud.umami.is/script.js" data-website-id="917373df-77e7-427a-8a7a-337d96ad28a3"></script>
</head>

<body>
  <header>
    <img src="img/logo.png" alt="WM Tippspiel Logo" class="logo">
  </header>

  <nav>
    <a href="index.html" class="active">🏆 Rangliste</a>
    <a href="results.html">📋 Tipps / Ergebnisse</a>
    <a href="special.html">⭐ Spezialtipps</a>
    <a href="players.html">👥 Mitspieler</a>
    <a href="regelwerk.html">📜 Regeln</a>
  </nav>

  <main>
    <div id="status"></div>
    <div id="phase2-container"></div>
    <div id="upcoming-container"></div>
    <div id="today-container"></div>

    <div id="leaderboard-container">
      <p class="empty">Lade Daten …</p>
    </div>
    <div id="chart-container"></div>
    <div id="news-container"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="js/app.js?v=30"></script>
  <script>
    autoRefresh(renderLeaderboard);
  </script>
</body>

</html>
