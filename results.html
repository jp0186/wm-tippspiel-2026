<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8" />
  <meta name="robots" content="noindex, nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WM Tippspiel 2026 — Ergebnisse</title>
  <style>
    :root {
      --bg: #0a0e1a;
      --surface: #131929;
      --surface2: #1c2540;
      --border: #2a3555;
      --text: #e8eaf6;
      --text-muted: #8892b0;
      --gold: #f5c518;
      --silver: #c0c7d4;
      --bronze: #cd7f32;
      --green: #4ade80;
      --yellow: #fbbf24;
      --red: #f87171;
      --accent: #4f86f7;
      --radius: 10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", system-ui, sans-serif;
      min-height: 100vh;
    }

    header {
      background: #f5f5f0;
      padding: 1.25rem 1.5rem 1rem;
      text-align: center;
    }

    header img.logo {
      height: 216px;
      width: 216px;
      object-fit: contain;
      display: block;
      margin: 0 auto;
    }

    nav {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
      padding: 0.75rem 1rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    nav a {
      color: var(--text-muted);
      text-decoration: none;
      padding: 0.4rem 1rem;
      border-radius: 6px;
      font-size: 0.9rem;
      transition: all 0.15s;
    }

    nav a:hover, nav a.active { background: var(--accent); color: #fff; }

    main { max-width: 960px; margin: 2rem auto; padding: 0 1rem; }

    #status {
      text-align: right;
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-bottom: 1rem;
    }

    .group-section { margin-bottom: 2.5rem; }

    .group-section h2 {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 1rem;
      padding-bottom: 0.4rem;
      border-bottom: 2px solid var(--border);
    }

    .match-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 0.75rem;
      overflow: hidden;
    }

    .match-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      background: var(--surface2);
      flex-wrap: wrap;
    }

    .match-date {
      font-size: 0.78rem;
      color: var(--text-muted);
      white-space: nowrap;
      min-width: 8rem;
    }

    .match-teams { flex: 1; font-weight: 600; font-size: 1rem; }
    .vs { font-weight: 400; color: var(--text-muted); margin: 0 0.3em; }

    .match-result {
      font-size: 1.15rem;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      min-width: 3.5rem;
      text-align: center;
      letter-spacing: 0.05em;
    }

    .match-result.final { color: var(--green); }
    .match-result.pending { color: var(--text-muted); }

    .tips-table { width: 100%; border-collapse: collapse; }

    .tips-table td {
      padding: 0.45rem 1rem;
      border-top: 1px solid var(--border);
      font-size: 0.9rem;
    }

    .tip-player { color: var(--text); }
    a.player-link { color: inherit; text-decoration: none; }
    a.player-link:hover { text-decoration: underline; color: var(--accent); }

    .tip-str {
      text-align: right;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      width: 3.5rem;
    }

    .tip-pts {
      text-align: right;
      font-weight: 700;
      white-space: nowrap;
      width: 4rem;
    }

    .tip-pts .exact  { color: var(--green); }
    .tip-pts .outcome { color: var(--yellow); }
    .tip-pts .miss   { color: var(--red); }
    .tip-pts .no-result { color: var(--text-muted); }

    .legend {
      display: flex;
      gap: 1.5rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      font-size: 0.82rem;
      color: var(--text-muted);
    }

    .legend span { display: flex; align-items: center; gap: 0.4rem; }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot.exact   { background: var(--green); }
    .dot.outcome { background: var(--yellow); }
    .dot.miss    { background: var(--red); }

    .empty, .error { text-align: center; padding: 3rem; color: var(--text-muted); }
    .error { color: var(--red); }

    @media (max-width: 540px) {
      .match-header { flex-direction: column; align-items: flex-start; gap: 0.3rem; }
      .match-result { align-self: flex-end; }
    }
  </style>
  <script defer src="https://cloud.umami.is/script.js" data-website-id="917373df-77e7-427a-8a7a-337d96ad28a3"></script>
</head>

<body>
  <header>
    <img src="img/logo.png" alt="WM Tippspiel Logo" class="logo">
  </header>

  <nav>
    <a href="index.html">🏆 Rangliste</a>
    <a href="results.html" class="active">📋 Tipps / Ergebnisse</a>
    <a href="special.html">⭐ Spezialtipps</a>
    <a href="players.html">👥 Mitspieler</a>
    <a href="regelwerk.html">📜 Regeln</a>
  </nav>

  <main>
    <div id="status"></div>

    <div class="legend">
      <span><span class="dot exact"></span> 3 Punkte — Exaktes Ergebnis</span>
      <span><span class="dot outcome"></span> 1 Punkt — Richtiger Ausgang (Sieg/Unentschieden/Niederlage)</span>
      <span><span class="dot miss"></span> 0 Punkte — Falsch</span>
    </div>

    <div id="results-container">
      <p class="empty">Lade Daten …</p>
    </div>
  </main>

  <script src="js/app.js?v=3"></script>
  <script>
    autoRefresh(renderResults);
  </script>
</body>

</html>
